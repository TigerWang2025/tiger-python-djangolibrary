{% extends "books/base.html" %}

{% block content %}
<section class="py-5 bg-light">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card shadow-sm border-0 text-center">
                    <div class="card-body p-5">
                        <div class="mb-3">
                            <!-- 可选：添加一个图标 -->
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" class="bi bi-envelope-check-fill text-success" viewBox="0 0 16 16">
                                <path d="M.05 3.555A2 2 0 0 1 2 2h12a2 2 0 0 1 1.95 1.555L8 8.414.05 3.555ZM0 4.697v7.104l5.803-3.558L0 4.697ZM6.761 8.83l-6.57 4.026A2 2 0 0 0 2 14h6.256A4.493 4.493 0 0 1 8 12.5a4.49 4.49 0 0 1 1.606-3.446l-.367-.225L8 9.586l-1.239-.757Zm1.622 2.074a.5.5 0 0 1-.762-.648l1.5-1.75a.5.5 0 0 1 .762 0l1.5 1.75a.5.5 0 1 1-.762.648L9.25 9.586 8 10.904Z"/>
                                <path d="M16 4.697v4.974A4.491 4.491 0 0 0 12.5 8a4.49 4.49 0 0 0-3.446 1.607l-.367-.225L14.39 4.697H16Z"/>
                            </svg>
                        </div>
                        <h3 class="fw-bold mb-3">邮件已发送</h3>
                        <p class="text-muted mb-4">
                            如果该邮箱存在于我们的数据库中，您将很快收到一封包含密码重置链接的邮件。
                        </p>
                        <p class="small text-muted">
                            没收到邮件？请检查垃圾邮件箱，或<a href="{% url 'password_reset' %}" class="text-primary">重新尝试</a>。
                        </p>
                        <div class="mt-4">
                            <a href="{% url 'login' %}" class="btn btn-outline-secondary">返回登录</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
